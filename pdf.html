<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure PDF Workspace</title>

<link rel="stylesheet" href="style.css">

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>

</head>

<body>

<!-- ===========================
        TOP TOOLBAR
=========================== -->

<header class="topbar">

<button id="toggleSidebar" title="Pages">
☰
</button>

<div class="pageInfo">

<input
type="number"
id="currentPage"
value="1"
min="1">

<span>/</span>

<span id="totalPages">0</span>

</div>

<div class="zoomBox">

<button id="zoomOut">−</button>

<span id="zoomPercent">
100%
</span>

<button id="zoomIn">+</button>

</div>

<div class="toolbarButtons">

<button id="editBtn" title="Edit">
✏️
</button>

<button id="undoBtn" disabled title="Undo">
↶
</button>

<button id="redoBtn" disabled title="Redo">
↷
</button>

<button id="eraserBtn" disabled title="Eraser">
🧽
</button>

<button id="saveBtn" disabled title="Save">
💾
</button>

<button id="shaBtn" title="SHA256">
SHA
</button>

</div>

</header>

<!-- ===========================
      MAIN CONTAINER
=========================== -->

<div class="workspace">

<!-- ===========================
      LEFT SIDEBAR
=========================== -->

<aside id="sidebar">

<div class="sidebarHeader">

<h3>Pages</h3>

</div>

<div id="thumbnailContainer">

<!-- PDF.js thumbnails -->

</div>

</aside>

<!-- ===========================
      PDF VIEWER
=========================== -->

<main id="viewerContainer">

    <div id="pdfViewer">

        <!-- PDF.js will automatically create all pages here -->

    </div>

</main>

</div>

<!-- ===========================
      SHA POPUP
=========================== -->

<div id="shaPopup" class="popup hidden">

<div class="popupHeader">

<h3>SHA256 Generator</h3>

<button id="closeSha">
✖
</button>

</div>

<div class="popupBody">

<input
type="text"
id="shaInput"
placeholder="Enter text">

<button id="generateHash">

Generate

</button>

<p id="hashResult">

</p>

</div>

</div>

<!-- ===========================
        EDIT POPUP
=========================== -->

<div id="editPopup" class="popup hidden">

    <div class="popupHeader">

        <h3>Edit Tools</h3>

        <button id="closeEdit">
            ✖
        </button>

    </div>

    <div class="popupBody">

        <button id="highlightYellow">
            🟨 Highlight
        </button>

        <button id="highlightGreen">
            🟩 Highlight
        </button>

        <button id="highlightBlue">
            🟦 Highlight
        </button>

        <button id="highlightPink">
            🩷 Highlight
        </button>

        <hr>

        <button id="drawTool">
            ✏️ Draw
        </button>

        <button id="textTool">
            📝 Text
        </button>

    </div>

</div>

<!-- ===========================
      SAVE STATUS
=========================== -->

<div id="saveStatus" class="hidden">

    Saved

</div>

<!-- ===========================
      LOADING SCREEN
=========================== -->

<div id="loadingScreen">

    <div class="loader">

        Loading PDF...

    </div>

</div>

<!-- ===========================
    ANNOTATION LAYER
=========================== -->

<div id="annotationLayer"></div>

<!-- ===========================
    BACKGROUND OVERLAY
=========================== -->

<div id="overlay" class="hidden"></div>

<!-- ===========================
    FUTURE HIDDEN CONTAINERS
=========================== -->

<div id="undoStack" hidden></div>

<div id="redoStack" hidden></div>

<div id="sessionData" hidden></div>

<!-- ===========================
        PDF SCRIPT
=========================== -->

<script src="pdf.js"></script>

</body>
</html>
